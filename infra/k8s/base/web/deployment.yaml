apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
    app.kubernetes.io/name: web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: micro-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
      app.kubernetes.io/name: web
      app.kubernetes.io/component: frontend
      app.kubernetes.io/part-of: micro-commerce
  template:
    metadata:
      labels:
        app: web
        app.kubernetes.io/name: web
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: micro-commerce
    spec:
      serviceAccountName: web
      containers:
      - name: web
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: web:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: production
        - name: HOSTNAME
          value: "0.0.0.0"
        - name: PORT
          value: "3000"
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: web-secrets
              key: auth-secret
        - name: AUTH_TRUST_HOST
          value: "true"
        - name: AUTH_URL
          value: "http://localhost:38800"
        - name: KEYCLOAK_ISSUER
          value: "http://keycloak.micro-commerce.svc.cluster.local:8080/realms/micro-commerce"
        - name: KEYCLOAK_CLIENT_ID
          value: "nextjs-app"
        - name: KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: web-secrets
              key: keycloak-client-secret
        - name: services__gateway__https__0
          value: "http://gateway:8080"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 256Mi
            cpu: 250m
