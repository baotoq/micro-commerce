apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels:
    app: otel-collector
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: micro-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
      app.kubernetes.io/name: otel-collector
      app.kubernetes.io/component: observability
      app.kubernetes.io/part-of: micro-commerce
  template:
    metadata:
      labels:
        app: otel-collector
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/component: observability
        app.kubernetes.io/part-of: micro-commerce
    spec:
      serviceAccountName: otel-collector
      containers:
      - name: otel-collector
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: otel/opentelemetry-collector:0.146.0
        imagePullPolicy: IfNotPresent
        args: ["--config=/etc/otelcol/otel-collector-config.yaml"]
        ports:
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        - containerPort: 13133
          name: health
        volumeMounts:
        - name: config
          mountPath: /etc/otelcol
        livenessProbe:
          httpGet:
            path: /
            port: 13133
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 13133
          periodSeconds: 10
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
            cpu: 200m
      volumes:
      - name: config
        configMap:
          name: otel-collector-config
