apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app: keycloak
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: micro-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/component: auth
      app.kubernetes.io/part-of: micro-commerce
  template:
    metadata:
      labels:
        app: keycloak
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: auth
        app.kubernetes.io/part-of: micro-commerce
    spec:
      serviceAccountName: keycloak
      containers:
      - name: keycloak
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: quay.io/keycloak/keycloak:26.0
        imagePullPolicy: IfNotPresent
        args: ["start-dev", "--import-realm"]
        env:
        - name: KC_BOOTSTRAP_ADMIN_USERNAME
          valueFrom:
            secretKeyRef:
              name: keycloak-credentials
              key: admin-username
        - name: KC_BOOTSTRAP_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-credentials
              key: admin-password
        - name: KC_HEALTH_ENABLED
          value: "true"
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9000
          name: management
        volumeMounts:
        - name: realm-config
          mountPath: /opt/keycloak/data/import
        startupProbe:
          httpGet:
            path: /health/started
            port: 9000
          initialDelaySeconds: 15
          periodSeconds: 3
          failureThreshold: 20
        livenessProbe:
          httpGet:
            path: /health/live
            port: 9000
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 9000
          periodSeconds: 10
        resources:
          requests:
            memory: 512Mi
            cpu: 500m
          limits:
            memory: 1Gi
            cpu: "1"
      volumes:
      - name: realm-config
        configMap:
          name: keycloak-realm
