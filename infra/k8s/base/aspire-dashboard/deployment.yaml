apiVersion: apps/v1
kind: Deployment
metadata:
  name: aspire-dashboard
  labels:
    app: aspire-dashboard
    app.kubernetes.io/name: aspire-dashboard
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: micro-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aspire-dashboard
      app.kubernetes.io/name: aspire-dashboard
      app.kubernetes.io/component: observability
      app.kubernetes.io/part-of: micro-commerce
  template:
    metadata:
      labels:
        app: aspire-dashboard
        app.kubernetes.io/name: aspire-dashboard
        app.kubernetes.io/component: observability
        app.kubernetes.io/part-of: micro-commerce
    spec:
      serviceAccountName: aspire-dashboard
      containers:
      - name: aspire-dashboard
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image: mcr.microsoft.com/dotnet/aspire-dashboard:9.3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 18888
          name: ui
        - containerPort: 18889
          name: otlp-grpc
        env:
        - name: DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS
          value: "true"
        - name: DASHBOARD__OTLP__AUTHMODE
          value: "Unsecured"
        startupProbe:
          httpGet:
            path: /
            port: 18888
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /
            port: 18888
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 18888
          periodSeconds: 10
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 250m
