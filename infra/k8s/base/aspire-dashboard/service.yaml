apiVersion: v1
kind: Service
metadata:
  name: aspire-dashboard
  labels:
    app: aspire-dashboard
spec:
  selector:
    app: aspire-dashboard
  ports:
  - port: 18888
    targetPort: 18888
    name: ui
    protocol: TCP
  - port: 18889
    targetPort: 18889
    name: otlp-grpc
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: aspire-dashboard-nodeport
  labels:
    app: aspire-dashboard
spec:
  type: NodePort
  selector:
    app: aspire-dashboard
  ports:
  - port: 18888
    targetPort: 18888
    nodePort: 30888
    name: ui
    protocol: TCP
