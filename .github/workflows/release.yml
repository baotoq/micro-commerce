name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions: {}

env:
  CONTAINER_REGISTRY: ghcr.io

jobs:
  tests:
    uses: ./.github/workflows/dotnet-test.yml
  release:
    needs: [tests]
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure 1Password Service Account
        uses: 1password/load-secrets-action/configure@v2
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Load Credentials
        id: load-credentials
        uses: 1password/load-secrets-action@v2
        with:
          export-env: false
        env:
          REGISTRY_USERNAME: op://cicd/image-registry/username
          REGISTRY_TOKEN: op://cicd/image-registry/password
          NUGET_TOKEN: op://cicd/nuget/password

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Generate build version
        id: generate-build-version
        run: |
          year=$(date '+%Y')
          month=$(date '+%-m')
          day=$(date '+%d')
          hour=$(date '+%-H%M')
          NEW_VERSION="${year}.${month}${day}.${hour}"
          echo "New Version: $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Build and Push BuildingBlocks.Common Nuget packages
        working-directory: src/BuildingBlocks/BuildingBlocks.Common
        run: |
          dotnet pack -c Release -o . /p:Version=${{ steps.generate-build-version.outputs.NEW_VERSION }}
          dotnet nuget push *.nupkg --api-key ${{ steps.load-credentials.outputs.NUGET_TOKEN }} --source https://nuget.pkg.github.com/${{ github.actor }}/index.json

      - name: Log in to Image Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ steps.load-credentials.outputs.REGISTRY_USERNAME }}
          password: ${{ steps.load-credentials.outputs.REGISTRY_TOKEN }}

      - name: Build and Push ApiService docker image
        working-directory: src
        run: |
          dotnet publish MicroCommerce.ApiService/MicroCommerce.ApiService.csproj -c Release \
            /t:PublishContainer \
            -p ContainerRegistry=${{ env.CONTAINER_REGISTRY }} \
            -p ContainerRepository=${{ github.repository }}/apiservice \
            -p ContainerImageTag=${{ github.ref_name }}

      - name: Build and Push Gateway docker image
        working-directory: src
        run: |
          dotnet publish MicroCommerce.Gateway/MicroCommerce.Gateway.csproj -c Release \
            /t:PublishContainer \
            -p ContainerRegistry=${{ env.CONTAINER_REGISTRY }} \
            -p ContainerRepository=${{ github.repository }}/gateway \
            -p ContainerImageTag=${{ github.ref_name }}
